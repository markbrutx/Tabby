name: Bug Report
description: Report a bug in Tabby
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
      placeholder: A clear description of the bug
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Open Tabby
        2. Do X
        3. See error
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Tabby Version
      description: "Check in Settings or run `tabby --version`"
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: macos-version
    attributes:
      label: macOS Version
      placeholder: "macOS 15.2 Sequoia"
    validations:
      required: true

  - type: dropdown
    id: chip
    attributes:
      label: Mac Chip
      options:
        - Apple Silicon (M1/M2/M3/M4)
        - Intel
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: Paste any relevant logs or attach screenshots
    validations:
      required: false
